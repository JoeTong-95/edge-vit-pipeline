# Locked May-report baseline config for local Jetson evaluation runs.
# Pair this config with one daytime clip and one nighttime clip via
# `pipeline/run_deployment_review.py --config ... --video ...`.

config_device: cuda
config_input_source: video
config_input_path: data/upson1.mp4
config_frame_resolution:
  - 640
  - 360
config_roi_enabled: true
config_roi_vehicle_count_threshold: 3
config_yolo_model: yolo11n_6class_finetuned.engine
config_yolo_confidence_threshold: 0.4
config_yolo_imgsz:
config_vlm_enabled: true
config_vlm_backend: smolvlm_256m
config_vlm_model: src/vlm-layer/SmolVLM-256M-Instruct
config_vlm_api_key_env: GEMINI_API_KEY
# Keep VLM on CPU for the locked baseline so Jetson GPU memory stays available
# for the TensorRT YOLO path during review-package runs.
config_vlm_device: cpu
config_vlm_crop_feedback_enabled: false
config_vlm_crop_cache_size: 4
config_vlm_dead_after_lost_frames: 30
config_vlm_runtime_mode: async
config_vlm_worker_max_queue_size: 64
config_vlm_worker_batch_size: 1
config_vlm_worker_batch_wait_ms: 50
config_vlm_worker_spill_queue_path: data/vlm_spill_queue.jsonl
config_vlm_spill_max_file_mb: 512
config_vlm_realtime_throttle_enabled: true
config_scene_awareness_enabled: false
config_metadata_output_enabled: true
config_evaluation_output_enabled: false
