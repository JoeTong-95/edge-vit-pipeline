config_device: cuda
config_input_source: video
config_input_path: data/upson1.mp4
config_frame_resolution:
  - 640
  - 360
config_roi_enabled: true
config_roi_vehicle_count_threshold: 3
config_yolo_model: yolov11v28_jingtao.engine
config_yolo_confidence_threshold: 0.4
config_yolo_imgsz: # null = model default (640x640)
config_vlm_enabled: true
config_vlm_model: src/vlm-layer/SmolVLM-256M-Instruct
config_vlm_device: cuda
config_vlm_crop_cache_size: 16
config_vlm_worker_enabled: true
config_vlm_worker_batch_size: 1  # 1 = minimal peak activation memory; 4 overflows NvMap with YOLO TRT loaded
config_vlm_worker_batch_wait_ms: 0  # 0ms wait = lowest first-result latency with batch=1
config_vlm_query_type: vehicle_semantics_v1
config_vehicle_state_output_dir: .
